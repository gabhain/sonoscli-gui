<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonos Web GUI</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <header>
                <h1>Sonos System</h1>
            </header>
            <nav id="room-list">
                <!-- Room list will be populated here -->
                <div class="loading">Loading rooms...</div>
            </nav>
        </aside>
        
        <main id="main-content">
            <div id="no-room-selected" class="centered">
                <p>Select a room to start controlling</p>
            </div>
            
            <div id="room-view" style="display: none;">
                <header class="room-header">
                    <h2 id="current-room-name">Room Name</h2>
                </header>
                
                <div class="now-playing-container">
                    <div class="album-art-container">
                        <img id="album-art" src="" alt="Album Art">
                    </div>
                    <div class="track-info">
                        <h3 id="track-title">No Track</h3>
                        <p id="track-artist">Unknown Artist</p>
                        <p id="track-album">Unknown Album</p>
                        
                        <div class="progress-container">
                            <span id="current-time">0:00</span>
                            <input type="range" id="progress-bar" min="0" max="100" value="0">
                            <span id="total-time">0:00</span>
                        </div>
                        
                        <div class="controls">
                            <button id="prev-btn" title="Previous">⏮</button>
                            <button id="play-pause-btn" title="Play/Pause">▶</button>
                            <button id="next-btn" title="Next">⏭</button>
                        </div>
                        
                        <div class="volume-container">
                            <span>🔈</span>
                            <input type="range" id="volume-slider" min="0" max="100" value="0">
                            <span>🔊</span>
                        </div>
                    </div>
                </div>
                
                <div class="tabs">
                    <button class="tab-link active" onclick="openTab(event, 'Audio')">Audio</button>
                    <button class="tab-link" onclick="openTab(event, 'Grouping')">Grouping</button>
                    <button class="tab-link" onclick="openTab(event, 'Queue')">Queue</button>
                    <button class="tab-link" onclick="openTab(event, 'Favorites')">Favorites</button>
                    <button class="tab-link" onclick="openTab(event, 'Inputs')">Inputs</button>
                </div>
                
                <div id="Audio" class="tab-content active">
                    <div class="settings-grid">
                        <div class="card">
                            <h3>Equalizer</h3>
                            <div class="setting-item">
                                <label>Bass</label>
                                <input type="range" id="bass-slider" min="-10" max="10" value="0">
                            </div>
                            <div class="setting-item">
                                <label>Treble</label>
                                <input type="range" id="treble-slider" min="-10" max="10" value="0">
                            </div>
                        </div>
                        <div class="card">
                            <h3>Modes</h3>
                            <button id="loudness-btn">Loudness</button>
                            <button id="night-btn">Night Mode</button>
                            <button id="speech-btn">Speech Enhancement</button>
                        </div>
                    </div>
                </div>
                
                <div id="Grouping" class="tab-content">
                    <div class="card">
                        <h3>Group Volume</h3>
                        <div class="volume-container">
                            <button id="group-mute-btn">Mute Group</button>
                            <input type="range" id="group-volume-slider" min="0" max="100" value="0">
                        </div>
                    </div>
                    <div class="card">
                        <h3>Manage Group</h3>
                        <div id="group-members-list">
                            <!-- Group members checkboxes -->
                        </div>
                    </div>
                </div>
                
                <div id="Queue" class="tab-content">
                    <div id="queue-list" class="scrollable-list">
                        <!-- Queue items -->
                    </div>
                </div>
                
                <div id="Favorites" class="tab-content">
                    <div id="favorites-list" class="scrollable-list">
                        <!-- Favorites items -->
                    </div>
                </div>
                
                <div id="Inputs" class="tab-content">
                    <div id="inputs-list" class="scrollable-list">
                        <!-- Inputs items -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js?v=2"></script>
    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
