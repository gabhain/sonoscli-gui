name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Package macOS App
        run: |
          if [ -f "Icon.png" ]; then
            fyne package -os darwin -icon Icon.png
          else
            fyne package -os darwin
          fi

      - name: Create macOS .pkg
        run: |
          pkgbuild --component sonoscli-gui.app --install-location /Applications --identifier com.sonoscli.gui sonoscli-gui.pkg

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-macos
          path: |
            sonoscli-gui.app
            sonoscli-gui.pkg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libwayland-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Package Linux App
        run: |
          if [ -f "Icon.png" ]; then
            fyne package -os linux -icon Icon.png
          else
            fyne package -os linux
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-linux
          path: sonoscli-gui.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Package Windows App
        run: |
          if (Test-Path "Icon.png") {
            fyne package -os windows -icon Icon.png
          } else {
            fyne package -os windows
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-windows
          path: sonoscli-gui.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sonoscli-gui-macos/sonoscli-gui.app
            sonoscli-gui-macos/sonoscli-gui.pkg
            sonoscli-gui-linux/sonoscli-gui.tar.gz
            sonoscli-gui-windows/sonoscli-gui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
