name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package macOS App
        run: |
          if [ -f "Icon.png" ]; then
            fyne package -os darwin -icon Icon.png
          else
            fyne package -os darwin
          fi

      - name: Zip macOS App
        run: zip -r sonoscli-gui-macos.zip sonoscli-gui.app

      - name: Create macOS .pkg
        run: |
          pkgbuild --component sonoscli-gui.app --install-location /Applications --identifier com.sonoscli.gui sonoscli-gui.pkg

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-macos
          path: |
            sonoscli-gui-macos.zip
            sonoscli-gui.pkg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libwayland-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package Linux App
        run: |
          if [ -f "Icon.png" ]; then
            fyne package -os linux -icon Icon.png
          else
            fyne package -os linux
          fi
          # Fyne package usually creates sonoscli-gui.tar.gz or a binary named sonoscli-gui
          if [ -f "sonoscli-gui.tar.gz" ]; then
            mv sonoscli-gui.tar.gz sonoscli-gui-linux.tar.gz
          elif [ -f "sonoscli-gui" ]; then
            tar -czvf sonoscli-gui-linux.tar.gz sonoscli-gui
          else
            echo "Searching for produced files..."
            ls -R
            # Fallback: if we can't find it, try to build it normally and tar it
            go build -o sonoscli-gui .
            tar -czvf sonoscli-gui-linux.tar.gz sonoscli-gui
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-linux
          path: sonoscli-gui-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package Windows App
        run: |
          if (Test-Path "Icon.png") {
            fyne package -os windows -icon Icon.png
          } else {
            fyne package -os windows
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonoscli-gui-windows
          path: sonoscli-gui.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Determine Release Type
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "title=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "title=Latest Development Build" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.title }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          files: |
            sonoscli-gui-macos/sonoscli-gui-macos.zip
            sonoscli-gui-macos/sonoscli-gui.pkg
            sonoscli-gui-linux/sonoscli-gui-linux.tar.gz
            sonoscli-gui-windows/sonoscli-gui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
